{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --text-dark: #1a0a0a;
    --text-light: #f5e6d3;
    --text-mid: #c9a882;
    --white-glass: rgba(255,255,255,0.08);
    --border-glass: rgba(255,255,255,0.15);
    --input-bg: rgba(0,0,0,0.35);
  }

  body {
    min-height: 100vh;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    background: #0a0610;
  }

  /* Hintergrund Canvas */
  #bg-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* Partikel Canvas */
  #particle-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 2;
  }

  /* Jahreszeit Label */
  .season-label {
    position: fixed;
    top: 32px; right: 36px;
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    z-index: 10;
    transition: opacity 1s ease;
  }

  /* Kanji Hintergrund */
  .kanji-bg {
    position: fixed;
    font-family: 'Noto Serif JP', serif;
    font-size: 220px;
    font-weight: 600;
    color: rgba(255,255,255,0.03);
    z-index: 1;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    letter-spacing: -10px;
    transition: opacity 2s ease;
    user-select: none;
  }

  .container {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding: 20px;
  }

  .header-deco { text-align: center; margin-bottom: 32px; }

  .torii-symbol {
    font-size: 42px;
    display: block;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 12px rgba(200,100,50,0.6));
    animation: toriiPulse 4s ease-in-out infinite;
  }

  @keyframes toriiPulse {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(200,100,50,0.5)); }
    50% { filter: drop-shadow(0 0 22px rgba(220,120,60,0.9)); }
  }

  .title-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 26px; font-weight: 300;
    color: var(--text-light);
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-shadow: 0 0 30px rgba(200,150,100,0.4);
  }

  .title-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px; letter-spacing: 6px;
    color: var(--text-mid); opacity: 0.8;
  }

  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 0 0 32px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,150,100,0.4), transparent);
  }
  .divider-symbol { font-size: 12px; color: var(--text-mid); opacity: 0.6; }

  /* Glassmorphism Card – dunkle Variante */
  .card {
    background: rgba(10,6,16,0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    border: 1px solid rgba(200,150,100,0.2);
    padding: 40px 36px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .form-group { margin-bottom: 22px; }

  label {
    display: block; font-size: 10px;
    letter-spacing: 4px; color: var(--text-mid);
    text-transform: uppercase; margin-bottom: 9px; font-weight: 700;
  }

  input[type="text"], input[type="password"] {
    width: 100%; padding: 13px 16px;
    background: var(--input-bg);
    border: 1px solid rgba(200,150,100,0.2);
    border-radius: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px; color: var(--text-light);
    outline: none; transition: all 0.3s ease;
  }

  input:focus {
    border-color: rgba(200,150,100,0.55);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 0 3px rgba(200,150,100,0.08), 0 0 20px rgba(200,100,50,0.1);
  }

  input::placeholder { color: rgba(200,150,100,0.3); }

  .error-msg { font-size: 12px; color: #e57373; letter-spacing: 0.5px; margin-top: 5px; display: block; }

  .alert {
    padding: 10px 16px; border-radius: 10px; font-size: 13px;
    margin-bottom: 16px; border: 1px solid rgba(229,115,115,0.3);
    background: rgba(229,115,115,0.08); color: #ef9a9a;
  }

  /* Button */
  .btn-submit {
    width: 100%; padding: 15px; margin-top: 6px;
    border: none; border-radius: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 5px; color: #fff; cursor: pointer;
    background: linear-gradient(135deg, #c85a1e 0%, #8b2500 50%, #4a0e0e 100%);
    box-shadow: 0 4px 24px rgba(180,60,20,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.3s ease;
    text-transform: uppercase; position: relative; overflow: hidden;
  }

  .btn-submit::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.6s ease;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200,80,20,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-submit:hover::before { left: 100%; }
  .btn-submit:active { transform: translateY(0); }

  .register-link {
    text-align: center; margin-top: 22px;
    font-size: 12px; color: var(--text-mid); opacity: 0.7;
    letter-spacing: 1px;
  }
  .register-link a {
    color: rgba(200,150,100,0.9); text-decoration: none;
    font-weight: 700; letter-spacing: 2px;
    border-bottom: 1px solid rgba(200,150,100,0.3); padding-bottom: 1px;
    transition: all 0.2s;
  }
  .register-link a:hover { color: #e8c49a; border-color: rgba(200,150,100,0.7); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<div class="kanji-bg" id="kanjiText">鳥居</div>
<div class="season-label" id="seasonLabel">春 · Frühling</div>

<div class="container">
  <div class="header-deco">
    <span class="torii-symbol">⛩️</span>
    <h1 class="title-main">Willkommen zurück</h1>
    <div class="title-jp">ようこそ · ANMELDEN</div>
  </div>

  <div class="divider"><span class="divider-symbol">⛩</span></div>

  <div class="card">
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username"
               placeholder="dein_username" value="{{ request.POST.username }}" autocomplete="username">
        {% if errors.username %}<span class="error-msg">{{ errors.username.0 }}</span>{% endif %}
      </div>

      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password">
        {% if errors.password %}<span class="error-msg">{{ errors.password.0 }}</span>{% endif %}
      </div>

      <button type="submit" class="btn-submit">入る · Eintreten</button>
    </form>

    <div class="register-link">
      Noch kein Konto? <a href="{% url 'register' %}">Registrieren</a>
    </div>
  </div>
</div>

<script>
// ─── Jahreszeiten Konfiguration ───────────────────────────────
const seasons = [
  {
    name: '春 · Frühling',
    kanji: '桜',
    sky: ['#1a0520', '#2d0a35', '#4a1560'],         // Nacht-Lila
    fog: 'rgba(255,182,193,0.06)',
    torii: '#cc4400',
    particles: { color: '#ffb7c5', type: 'petal', count: 45 }
  },
  {
    name: '夏 · Sommer',
    kanji: '夏',
    sky: ['#000d1a', '#001a33', '#002244'],          // Tiefes Nachtblau
    fog: 'rgba(100,180,255,0.05)',
    torii: '#cc3300',
    particles: { color: '#e0f0ff', type: 'firefly', count: 30 }
  },
  {
    name: '秋 · Herbst',
    kanji: '紅葉',
    sky: ['#1a0800', '#2d1000', '#401800'],          // Dunkles Braun-Rot
    fog: 'rgba(255,140,50,0.06)',
    torii: '#8b2500',
    particles: { color: '#e8740a', type: 'leaf', count: 40 }
  },
  {
    name: '冬 · Winter',
    kanji: '雪',
    sky: ['#050510', '#0a0a20', '#0f0f2e'],          // Fast-Schwarz Blau
    fog: 'rgba(200,220,255,0.06)',
    torii: '#aa2200',
    particles: { color: '#e8f0ff', type: 'snow', count: 60 }
  }
];

let currentSeason = 0;
let nextSeason = 1;
let transitionProgress = 0;   // 0-1 – wie weit der Übergang ist
let seasonTimer = 0;
const SEASON_DURATION = 420;  // Frames pro Jahreszeit
const TRANSITION_DURATION = 90;

// ─── Hintergrund Canvas ───────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

// ─── Partikel Canvas ─────────────────────────────────────────
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  bgCanvas.width = pCanvas.width = window.innerWidth;
  bgCanvas.height = pCanvas.height = window.innerHeight;
});

// ─── Farb-Interpolation ───────────────────────────────────────
function lerpColor(a, b, t) {
  const parse = c => [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
  const ca = parse(a), cb = parse(b);
  return `rgb(${Math.round(ca[0]+(cb[0]-ca[0])*t)},${Math.round(ca[1]+(cb[1]-ca[1])*t)},${Math.round(ca[2]+(cb[2]-ca[2])*t)})`;
}

// ─── Torii zeichnen ───────────────────────────────────────────
function drawTorii(ctx, w, h, toriiColor, fogAlpha) {
  const cx = w * 0.5;
  const baseY = h * 0.82;
  const scale = Math.min(w, h) * 0.0018;

  ctx.save();

  // Nebel-Boden
  const fogGrad = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, w * 0.55);
  fogGrad.addColorStop(0, `rgba(255,255,255,${fogAlpha * 1.2})`);
  fogGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, 0, w, h);

  // Schatten/Tiefe unter dem Torii
  const shadowGrad = ctx.createRadialGradient(cx, baseY + 10, 0, cx, baseY + 10, 200 * scale);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0.35)');
  shadowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = toriiColor;
  ctx.shadowColor = toriiColor;
  ctx.shadowBlur = 18;

  const pillarH = 280 * scale;
  const pillarW = 18 * scale;
  const gateW = 320 * scale;
  const topBeamH = 22 * scale;
  const midBeamH = 14 * scale;
  const topOverhang = 40 * scale;
  const topCurve = 20 * scale;

  const leftX = cx - gateW / 2;
  const rightX = cx + gateW / 2;
  const topBeamY = baseY - pillarH;

  // Linker Pfeiler
  ctx.beginPath();
  ctx.roundRect(leftX - pillarW/2, topBeamY + topBeamH, pillarW, pillarH - topBeamH, 3);
  ctx.fill();

  // Rechter Pfeiler
  ctx.beginPath();
  ctx.roundRect(rightX - pillarW/2, topBeamY + topBeamH, pillarW, pillarH - topBeamH, 3);
  ctx.fill();

  // Mittlerer Querbalken
  const midBeamY = topBeamY + pillarH * 0.28;
  ctx.beginPath();
  ctx.roundRect(leftX - pillarW/4, midBeamY, gateW + pillarW/2, midBeamH, 3);
  ctx.fill();

  // Oberer Querbalken (geschwungen)
  ctx.beginPath();
  ctx.moveTo(leftX - topOverhang, topBeamY + topCurve);
  ctx.quadraticCurveTo(cx, topBeamY - topCurve * 1.5, rightX + topOverhang, topBeamY + topCurve);
  ctx.lineTo(rightX + topOverhang, topBeamY + topBeamH);
  ctx.quadraticCurveTo(cx, topBeamY + topBeamH/2, leftX - topOverhang, topBeamY + topBeamH);
  ctx.closePath();
  ctx.fill();

  // Glow-Reflexion auf Torii
  ctx.shadowBlur = 0;
  const glowGrad = ctx.createLinearGradient(0, topBeamY, 0, topBeamY + topBeamH);
  glowGrad.addColorStop(0, 'rgba(255,200,150,0.12)');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.moveTo(leftX - topOverhang, topBeamY + topCurve);
  ctx.quadraticCurveTo(cx, topBeamY - topCurve * 1.5, rightX + topOverhang, topBeamY + topCurve);
  ctx.lineTo(rightX + topOverhang, topBeamY + topBeamH);
  ctx.quadraticCurveTo(cx, topBeamY + topBeamH/2, leftX - topOverhang, topBeamY + topBeamH);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ─── Hintergrund rendern ─────────────────────────────────────
function drawBackground(cs, ns, t) {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);

  // Himmel-Gradient interpolieren
  for (let i = 0; i < 3; i++) {
    cs.sky[i] = cs.sky[i] || '#000000';
    ns.sky[i] = ns.sky[i] || '#000000';
  }

  const skyGrad = bgCtx.createLinearGradient(0, 0, 0, h);
  skyGrad.addColorStop(0, lerpColor(cs.sky[0], ns.sky[0], t));
  skyGrad.addColorStop(0.5, lerpColor(cs.sky[1], ns.sky[1], t));
  skyGrad.addColorStop(1, lerpColor(cs.sky[2], ns.sky[2], t));
  bgCtx.fillStyle = skyGrad;
  bgCtx.fillRect(0, 0, w, h);

  // Mond
  const moonY = h * 0.18;
  const moonGlow = bgCtx.createRadialGradient(w*0.72, moonY, 0, w*0.72, moonY, 80);
  moonGlow.addColorStop(0, 'rgba(255,248,220,0.25)');
  moonGlow.addColorStop(0.3, 'rgba(255,240,180,0.1)');
  moonGlow.addColorStop(1, 'transparent');
  bgCtx.fillStyle = moonGlow;
  bgCtx.fillRect(0, 0, w, h);

  bgCtx.beginPath();
  bgCtx.arc(w*0.72, moonY, 28, 0, Math.PI*2);
  bgCtx.fillStyle = 'rgba(255,248,220,0.88)';
  bgCtx.shadowColor = 'rgba(255,240,180,0.6)';
  bgCtx.shadowBlur = 25;
  bgCtx.fill();
  bgCtx.shadowBlur = 0;

  // Berge / Silhouette
  bgCtx.fillStyle = 'rgba(0,0,0,0.55)';
  bgCtx.beginPath();
  bgCtx.moveTo(0, h*0.75);
  bgCtx.bezierCurveTo(w*0.1, h*0.55, w*0.2, h*0.6, w*0.3, h*0.5);
  bgCtx.bezierCurveTo(w*0.4, h*0.4, w*0.5, h*0.65, w*0.6, h*0.55);
  bgCtx.bezierCurveTo(w*0.7, h*0.45, w*0.85, h*0.6, w, h*0.65);
  bgCtx.lineTo(w, h); bgCtx.lineTo(0, h); bgCtx.closePath();
  bgCtx.fill();

  // Nebel-Schicht
  const fogGrad = bgCtx.createLinearGradient(0, h*0.6, 0, h*0.85);
  fogGrad.addColorStop(0, 'transparent');
  fogGrad.addColorStop(0.5, cs.fog);
  fogGrad.addColorStop(1, 'transparent');
  bgCtx.fillStyle = fogGrad;
  bgCtx.fillRect(0, 0, w, h);

  // Torii Farbe interpolieren
  const toriiColor = lerpColor(cs.torii, ns.torii, t);
  const fogAlpha = parseFloat(cs.fog.match(/[\d.]+(?=\))/)[0]);
  drawTorii(bgCtx, w, h, toriiColor, fogAlpha + t * 0.02);
}

// ─── Partikel System ─────────────────────────────────────────
let particles = [];

function createParticles(season) {
  const cfg = season.particles;
  return Array.from({length: cfg.count}, () => ({
    x: Math.random() * pCanvas.width,
    y: Math.random() * pCanvas.height - pCanvas.height,
    size: Math.random() * 8 + 4,
    speedY: Math.random() * 1.5 + 0.4,
    speedX: Math.random() * 1.2 - 0.6,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    opacity: Math.random() * 0.6 + 0.2,
    swaySpeed: Math.random() * 0.02 + 0.005,
    swayOffset: Math.random() * Math.PI * 2,
    sway: Math.random() * 3,
    color: cfg.color,
    type: cfg.type,
    pulse: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.05 + 0.02
  }));
}

function drawParticle(ctx, p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation);
  ctx.globalAlpha = p.opacity;
  ctx.fillStyle = p.color;

  if (p.type === 'petal') {
    ctx.beginPath();
    ctx.ellipse(0, -p.size/2, p.size*0.38, p.size*0.58, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(p.size*0.28, 0, p.size*0.38, p.size*0.58, Math.PI/3, 0, Math.PI*2);
    ctx.fill();

  } else if (p.type === 'firefly') {
    const glow = ctx.createRadialGradient(0,0,0,0,0,p.size*1.5);
    glow.addColorStop(0, 'rgba(180,255,150,0.9)');
    glow.addColorStop(1, 'transparent');
    ctx.globalAlpha = p.opacity * (0.5 + 0.5 * Math.sin(p.pulse));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, p.size*1.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e0ffcc';
    ctx.globalAlpha = p.opacity;
    ctx.beginPath();
    ctx.arc(0, 0, p.size*0.4, 0, Math.PI*2);
    ctx.fill();

  } else if (p.type === 'leaf') {
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size*0.35, p.size*0.55, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -p.size*0.5);
    ctx.lineTo(0, p.size*0.5);
    ctx.stroke();

  } else if (p.type === 'snow') {
    ctx.beginPath();
    ctx.arc(0, 0, p.size*0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(220,235,255,0.85)';
    ctx.fill();
  }

  ctx.restore();
}

particles = createParticles(seasons[0]);

// ─── Haupt-Loop ───────────────────────────────────────────────
let frame = 0;

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  frame++;
  seasonTimer++;

  // Jahreszeit-Übergang steuern
  const inTransition = seasonTimer > SEASON_DURATION;
  if (inTransition) {
    transitionProgress = (seasonTimer - SEASON_DURATION) / TRANSITION_DURATION;
    if (transitionProgress >= 1) {
      currentSeason = nextSeason;
      nextSeason = (nextSeason + 1) % seasons.length;
      seasonTimer = 0;
      transitionProgress = 0;
      particles = createParticles(seasons[currentSeason]);
      document.getElementById('kanjiText').textContent = seasons[currentSeason].kanji;
    }
  }

  const cs = seasons[currentSeason];
  const ns = seasons[nextSeason];
  const t = inTransition ? Math.min(transitionProgress, 1) : 0;

  // Season Label updaten
  document.getElementById('seasonLabel').textContent = t > 0.5 ? ns.name : cs.name;

  // Hintergrund
  drawBackground(cs, ns, t);

  // Partikel
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX + Math.sin(frame * p.swaySpeed + p.swayOffset) * p.sway * 0.06;
    p.rotation += p.rotSpeed;
    p.pulse += p.pulseSpeed;

    if (p.type === 'firefly') {
      p.speedX += (Math.random() - 0.5) * 0.08;
      p.speedX = Math.max(-1.5, Math.min(1.5, p.speedX));
    }

    if (p.y > pCanvas.height + 20) {
      p.y = -20;
      p.x = Math.random() * pCanvas.width;
    }

    drawParticle(pCtx, p);
  });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
